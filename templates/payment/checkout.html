{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-credit-card"></i> Finalizar Compra</h4>
            </div>
            <div class="card-body">
                <div class="text-center mb-4">
                    <h5>Detalle del pedido</h5>
                    <h2 class="text-primary">{{ plan.nombre }}</h2>
                    <p>{{ plan.descripcion }}</p>
                    <h3 class="text-success">${{ "%.2f"|format(plan.precio) }} MXN</h3>
                </div>
                
                <hr>
                
                <div id="payment-element">
                    <div class="text-center my-4">
                        <div class="spinner-border text-primary"></div>
                        <p>Preparando pago...</p>
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('payment.index') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Volver a tienda
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    const stripe = Stripe('{{ stripe_public_key }}');
    const planId = '{{ plan.id }}';
    
    async function initializeCheckout() {
        const response = await fetch('/pagos/api/create-checkout-session', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ plan_id: planId })
        });
        
        const data = await response.json();
        
        if (data.success && data.url) {
            // Redirigir a Stripe Checkout
            window.location.href = data.url;
        } else {
            document.getElementById('payment-element').innerHTML = `
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i>
                    Error al iniciar el pago. Intenta nuevamente.
                </div>
            `;
        }
    }
    
    initializeCheckout();
</script>
{% endblock %}
