{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-success">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-check-circle"></i> Pago Exitoso</h4>
            </div>
            <div class="card-body text-center py-5">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                <h2 class="mt-3">¡Gracias por tu compra!</h2>
                <p class="lead">Tu pedido ha sido procesado correctamente.</p>
                <p>Recibirás un correo con los detalles de tu compra.</p>
                <hr>
                <a href="{{ url_for('menu') }}" class="btn btn-success">
                    <i class="bi bi-house"></i> Ir al Inicio
                </a>
                <a href="{{ url_for('payment.historial') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-clock-history"></i> Ver Historial
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
